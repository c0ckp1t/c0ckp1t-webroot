<html lang="en">

<head>
  <meta charset="utf-8">

  <link rel="icon" href="logo_v1.svg" type="image/svg+xml">
  <link href="https://cdn.jsdelivr.net/npm/c0ckp1t@1.0.17/css/bootstrap.min.css"  type="text/css" rel="stylesheet">
  <script type="importmap">
    {
        "imports": {
            "Logging": "https://cdn.jsdelivr.net/npm/c0ckp1t@1.0.17/core/Logging.mjs",
            "GlobalStore": "https://cdn.jsdelivr.net/npm/c0ckp1t@1.0.17/core/GlobalStore.mjs",
            "NotifyUtils": "https://cdn.jsdelivr.net/npm/c0ckp1t@1.0.17/core/notify/NotifyUtils.mjs",
            "VueUtils": "https://cdn.jsdelivr.net/npm/c0ckp1t@1.0.17/core/VueUtils.mjs",
            "JsUtils": "https://cdn.jsdelivr.net/npm/c0ckp1t@1.0.17/core/JsUtils.mjs",
            "WsUtils": "https://cdn.jsdelivr.net/npm/c0ckp1t@1.0.17/core/WsUtils.mjs",
            "CoreUtils": "https://cdn.jsdelivr.net/npm/c0ckp1t@1.0.17/core/CoreUtils.mjs",
            "WsLogUtils": "https://cdn.jsdelivr.net/npm/c0ckp1t@1.0.17/core/WsLogUtils.mjs",

            "IslandDefault": "https://cdn.jsdelivr.net/npm/c0ckp1t@1.0.17/core/IslandDefault.mjs",
            "Island": "https://cdn.jsdelivr.net/npm/c0ckp1t@1.0.17/core/Island.mjs",

            "vue": "https://cdn.jsdelivr.net/npm/c0ckp1t@1.0.17/js_ext/vue.esm-browser.prod.min.js",

            "idb-keyval": "https://cdn.jsdelivr.net/npm/c0ckp1t@1.0.17/js_ext/idb-keyval-6.2.2.mjs",
            "wavesurfer": "https://cdn.jsdelivr.net/npm/c0ckp1t@1.0.17/js_ext/wavesurfer.esm.mjs",
            "mitt": "https://cdn.jsdelivr.net/npm/c0ckp1t@1.0.17/js_ext/mitt.mjs",
            "msgpack": "https://cdn.jsdelivr.net/npm/c0ckp1t@1.0.17/js_ext/msgpack.mjs",

        }

</head>

<body class="main-body">

<div id="app-default" >
  <app-main></app-main>
</div>
</body>

<!-- =================== SCRIPTS ===================  -->
<script src="https://cdn.jsdelivr.net/npm/c0ckp1t@1.0.17/js_ext/loglevel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/c0ckp1t@1.0.17/js_ext/loglevel-plugin-prefix.min.js"></script>

<script type="module">
  import {init as initLogger} from 'Logging';
  import {api as apiMain} from 'GlobalStore'
  import {createConfig} from 'https://cdn.jsdelivr.net/npm/c0ckp1t@1.0.17/Config.mjs'

  const config = createConfig({
    appEndpoint: "https://cdn.jsdelivr.net/npm/c0ckp1t@1.0.17",
    routePrefix: "https://cdn.jsdelivr.net/npm/c0ckp1t@1.0.17",
    componentPrefix: "https://cdn.jsdelivr.net/npm/c0ckp1t@1.0.17",
    appMainComponent: "./PageMain.vue",
    appName: "Landing Page Example",
    vueRouterModeIsHash: true,
    routes: [
      { path: '/', name: 'root', children: []}
     ]
  })
  initLogger(config)
  await apiMain.init("app-default", config)
</script>

</html>
