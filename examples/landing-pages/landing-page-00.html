<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIRAL MENU // PHREAK</title>
    <style>
        :root {
            --bg-dark: #050505;
            --crt-scanline: rgba(18, 16, 16, 0.4);
            --retro-red: #8B0000;
            --retro-yellow: #FFD700;
            --retro-white: #e0e0e0;
            --hacker-font: 'Courier New', Courier, monospace;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: var(--retro-white);
            font-family: var(--hacker-font);
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- 1. Psychedelic Background --- */
        #background-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            filter: blur(2px) contrast(150%);
            opacity: 0.7;
        }

        /* --- 2. Main Container --- */
        .container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* --- 3. Circular Menu Layout --- */
        .orbit-system {
            position: absolute;
            width: 700px; /* Large orbit */
            height: 700px;
            border-radius: 50%;
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Item Wrapper matches orbit size but counter-rotates to keep images upright */
        .planet-wrapper {
            position: absolute;
            width: 150px;
            height: 150px;
            /* Positioning on the circle edge */
            top: 50%;
            left: 50%;
            margin-top: -75px;
            margin-left: -75px;
        }

        /* Specific positions for planets (Basic trig for a circle) */
        .pos-1 { transform: rotate(0deg) translate(280px) rotate(0deg); }
        .pos-2 { transform: rotate(72deg) translate(280px) rotate(-72deg); }
        .pos-3 { transform: rotate(144deg) translate(280px) rotate(-144deg); }
        .pos-4 { transform: rotate(216deg) translate(280px) rotate(-216deg); }
        .pos-5 { transform: rotate(288deg) translate(280px) rotate(-288deg); }

        /* The actual circle content */
        .planet-content {
            width: 100%;
            height: 100%;
            background: black;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.2);
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            position: relative;
        }

        /* Inner graphics generated by SVG inside the HTML */
        .planet-svg {
            width: 100%;
            height: 100%;
        }

        /* --- 4. The Bar Menu (Bottom Center) --- */
        .menu-bar-container {
            position: absolute;
            bottom: 10%;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            border: 2px solid #555;
            box-shadow: 5px 5px 15px #000;
            transform: skewX(-10deg); /* Slight retro tilt */
        }

        .menu-header {
            background-color: var(--retro-red);
            color: var(--retro-white);
            width: 100%;
            padding: 5px 10px;
            font-weight: bold;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
            text-shadow: 2px 2px 0px #000;
        }

        .syringe-icon {
            width: 20px;
            height: 20px;
            fill: white;
            filter: drop-shadow(1px 1px 0 #000);
        }

        .menu-items {
            display: flex;
            background-color: #000;
        }

        .menu-item {
            padding: 8px 15px;
            border-right: 1px solid #555;
            border-top: 1px solid #555;
            color: #aaa;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .menu-item:last-child {
            border-right: none;
        }

        .menu-item:hover {
            background-color: var(--retro-white);
            color: #000;
        }

        /* --- 5. "Phreak" Label --- */
        .phreak-label {
            position: absolute;
            bottom: 15%;
            left: 5%;
            background-color: var(--retro-red);
            color: white;
            padding: 5px 15px;
            font-weight: 900;
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            transform: rotate(-5deg);
            box-shadow: 3px 3px 0 #000;
            z-index: 5;
        }

        /* --- 6. CRT Overlay Effect --- */
        .crt-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 999;
            background: linear-gradient(
                    rgba(18, 16, 16, 0) 50%,
                    rgba(0, 0, 0, 0.25) 50%
            );
            background-size: 100% 4px; /* Scanlines */
        }

        .crt-flicker {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.02);
            opacity: 0;
            z-index: 998;
            pointer-events: none;
            animation: flicker 0.15s infinite;
        }

        @keyframes flicker {
            0% { opacity: 0.02; }
            50% { opacity: 0.05; }
            100% { opacity: 0.02; }
        }

        /* --- SVG Specific Styles --- */
        /* Cookie Monster */
        .cookie-skin { fill: #0044aa; }
        .cookie-mouth { fill: #000; d: path('M 20 60 Q 50 85 80 60'); stroke: #000; stroke-width: 5; stroke-linecap: round;}
        .eye-white { fill: white; }
        .eye-pupil { fill: black; }

        /* Hacker Smiley */
        .smiley-face { fill: var(--retro-yellow); stroke: #000; stroke-width: 2; }
        .eyepatch { fill: black; }
        .mouth-zigzag { fill: none; stroke: var(--retro-red); stroke-width: 2; }
        .network-line { stroke: #fff; stroke-width: 1; stroke-dasharray: 2,2; }

        /* Wireframe Cube */
        .cube-line { stroke: var(--retro-red); stroke-width: 1.5; fill: none; }

    </style>
</head>
<body>

<!-- 1. Background Pattern (Simulating the heat map noise) -->
<svg id="background-svg" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <filter id="displacementFilter">
            <feTurbulence type="turbulence" baseFrequency="0.01" numOctaves="3" result="turbulence" />
            <feDisplacementMap in2="turbulence" in="SourceGraphic" scale="50" xChannelSelector="R" yChannelSelector="G" />
        </filter>
        <pattern id="plasma" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
            <rect x="0" y="0" width="100" height="100" fill="#003366"/> <!-- Dark Blue Base -->
            <circle cx="20" cy="20" r="30" fill="#cc3300" opacity="0.6"/> <!-- Red blobs -->
            <circle cx="80" cy="80" r="40" fill="#cc9900" opacity="0.5"/> <!-- Yellow blobs -->
            <circle cx="80" cy="20" r="25" fill="#0099cc" opacity="0.4"/> <!-- Light Blue blobs -->
        </pattern>
    </defs>
    <rect width="100%" height="100%" fill="url(#plasma)" filter="url(#displacementFilter)" />
</svg>

<!-- 2. CRT Overlay -->
<div class="crt-overlay"></div>
<div class="crt-flicker"></div>

<!-- 3. Main Content -->
<div class="container">

    <!-- Rotating Menu Ring -->
    <div class="orbit-system">

        <!-- Item 1: Cookie Monster (Top Right in ref) -->
        <div class="planet-wrapper pos-1">
            <div class="planet-content">
                <svg class="planet-svg" viewBox="0 0 100 100">
                    <!-- Fuzzy edges simulation -->
                    <filter id="fuzzy">
                        <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" result="noise" />
                        <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" />
                    </filter>
                    <circle cx="50" cy="50" r="45" class="cookie-skin" filter="url(#fuzzy)"/>

                    <!-- Eyes -->
                    <g transform="translate(0, -10)">
                        <circle cx="35" cy="40" r="12" class="eye-white" />
                        <circle cx="37" cy="40" r="4" class="eye-pupil" /> <!-- Derpy pupil -->

                        <circle cx="65" cy="35" r="12" class="eye-white" />
                        <circle cx="63" cy="30" r="4" class="eye-pupil" /> <!-- Derpy pupil -->
                    </g>
                    <!-- Mouth -->
                    <path d="M 20 65 Q 50 90 80 65" fill="none" stroke="black" stroke-width="8" stroke-linecap="round" />
                </svg>
            </div>
        </div>

        <!-- Item 2: Network Smileys (Left in ref) -->
        <div class="planet-wrapper pos-2">
            <div class="planet-content">
                <svg class="planet-svg" viewBox="0 0 100 100" style="background:black;">
                    <!-- Connection Lines -->
                    <line x1="50" y1="50" x2="20" y2="20" class="network-line" />
                    <line x1="50" y1="50" x2="80" y2="20" class="network-line" />
                    <line x1="50" y1="50" x2="20" y2="80" class="network-line" />

                    <!-- Central Smiley -->
                    <circle cx="50" cy="50" r="15" class="smiley-face" />
                    <path d="M 40 45 L 60 45 L 60 55 A 10 10 0 0 1 40 55 Z" class="eyepatch" />
                    <!-- Zigzag mouth -->
                    <path d="M 40 60 L 43 57 L 46 60 L 49 57 L 52 60" fill="none" class="mouth-zigzag" style="stroke-width:1;" />

                    <!-- Small Smileys -->
                    <circle cx="20" cy="20" r="10" class="smiley-face" />
                    <circle cx="80" cy="20" r="10" class="smiley-face" />
                    <circle cx="20" cy="80" r="10" fill="#cc3300" stroke="black" stroke-width="1"/>
                    <circle cx="80" cy="80" r="10" fill="#cc3300" stroke="black" stroke-width="1"/>
                </svg>
            </div>
        </div>

        <!-- Item 3: Wireframe Box (Top Left in ref) -->
        <div class="planet-wrapper pos-3">
            <div class="planet-content">
                <svg class="planet-svg" viewBox="0 0 100 100">
                    <rect width="100" height="100" fill="black" />
                    <g transform="translate(50,50) rotate(15)">
                        <!-- Back Face -->
                        <rect x="-20" y="-20" width="40" height="40" class="cube-line" opacity="0.5" stroke-dasharray="2,2"/>
                        <!-- Connecting Lines -->
                        <line x1="-20" y1="-20" x2="-30" y2="-30" class="cube-line" />
                        <line x1="20" y1="-20" x2="30" y2="-30" class="cube-line" />
                        <line x1="20" y1="20" x2="30" y2="30" class="cube-line" />
                        <line x1="-20" y1="20" x2="-30" y2="30" class="cube-line" />
                        <!-- Front Face -->
                        <rect x="-30" y="-30" width="60" height="60" class="cube-line" />
                        <!-- "Virus" tendrils inside -->
                        <path d="M 0 0 L 10 -10 M 0 0 L -10 15 M 0 0 L 15 5" stroke="#cc3300" stroke-width="2" />
                    </g>
                </svg>
            </div>
        </div>

        <!-- Item 4: Virus Face (Bottom Right in ref) -->
        <div class="planet-wrapper pos-4">
            <div class="planet-content">
                <svg class="planet-svg" viewBox="0 0 100 100" style="background:var(--retro-yellow);">
                    <!-- Eyepatch -->
                    <circle cx="70" cy="40" r="15" fill="black" />
                    <circle cx="30" cy="40" r="5" fill="black"/>
                    <path d="M 68 25 L 90 20" stroke="black" stroke-width="3" /> <!-- Strap -->

                    <!-- Zigzag Mouth -->
                    <polyline points="20,70 30,85 40,70 50,85 60,70 70,85 80,70" fill="none" stroke="black" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
        </div>

        <!-- Item 5: PacMan (Just adding variety for 5th slot) -->
        <div class="planet-wrapper pos-5">
            <div class="planet-content">
                <svg class="planet-svg" viewBox="0 0 100 100" style="background:#000;">
                    <circle cx="50" cy="50" r="40" fill="yellow" />
                    <path d="M 50 50 L 95 30 L 95 70 Z" fill="black" /> <!-- Mouth cutout -->

                    <circle cx="30" cy="50" r="5" fill="pink" /> <!-- Ghost dot -->
                    <circle cx="10" cy="50" r="5" fill="pink" />
                </svg>
            </div>
        </div>

    </div>

    <!-- Static Decoration -->
    <div class="phreak-label">PHREAK</div>

    <!-- Bottom Menu -->
    <div class="menu-bar-container">
        <div class="menu-header">
            <span>VIRAL MENU</span>
            <!-- Simple Syringe Icon via SVG -->
            <svg class="syringe-icon" viewBox="0 0 24 24">
                <path d="M5 21l3-3 2 2 3-3-2-2 3-3-5-5-3 3 2 2-3 3 2 2ZM19 3l-4 4" stroke="white" stroke-width="2" fill="none"/>
                <rect x="13" y="5" width="4" height="6" transform="rotate(45 15 8)" fill="white"/>
            </svg>
        </div>
        <div class="menu-items">
            <div class="menu-item" onclick="alert('System Compromised: Tweetie')">Tweetie</div>
            <div class="menu-item" onclick="alert('System Compromised: Bugs')">Bugs</div>
            <div class="menu-item" onclick="alert('Cookie Requested')">Cookie</div>
            <div class="menu-item" onclick="alert('Don\'t have a cow man')">Bart</div>
            <div class="menu-item" onclick="alert('Waka Waka')">PacMan</div>
        </div>
    </div>

</div>

</body>
</html>
